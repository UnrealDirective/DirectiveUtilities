name: Build Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        unreal-version: ['5.6', '5.7', '5.8']
        include:
          - unreal-version: '5.6'
            engine-path: 'C:/Program Files/Epic Games/UE_5.6'
          - unreal-version: '5.7'
            engine-path: 'C:/Program Files/Epic Games/UE_5.7'
          - unreal-version: '5.8'
            engine-path: 'C:/Program Files/Epic Games/UE_5.8'

    name: UE ${{ matrix.unreal-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Plugin
        shell: cmd
        env:
          ENGINE_PATH: ${{ matrix.engine-path }}
          UE_VERSION: ${{ matrix.unreal-version }}
        run: |
          "%ENGINE_PATH%/Engine/Build/BatchFiles/RunUAT.bat" BuildPlugin -Plugin="%GITHUB_WORKSPACE%/DirectiveUtilities.uplugin" -Package="%GITHUB_WORKSPACE%/Build/UE%UE_VERSION%" -TargetPlatforms=Win64+Linux -Rocket

      - name: Run Automation Tests
        shell: pwsh
        env:
          ENGINE_PATH: ${{ matrix.engine-path }}
          UE_VERSION: ${{ matrix.unreal-version }}
        run: |
          $testHost = Join-Path $env:GITHUB_WORKSPACE "TestHost-UE$env:UE_VERSION"
          $pluginDirectory = Join-Path $testHost "Plugins/DirectiveUtilities"
          $reportDirectory = Join-Path $env:GITHUB_WORKSPACE "TestReport-UE$env:UE_VERSION"
          $projectPath = Join-Path $testHost "DirectiveUtilitiesTestHost.uproject"

          New-Item -ItemType Directory -Path $pluginDirectory -Force | Out-Null
          Copy-Item -Path "$env:GITHUB_WORKSPACE/Build/UE$env:UE_VERSION/*" -Destination $pluginDirectory -Recurse -Force

          @{
            FileVersion = 3
            EngineAssociation = $env:UE_VERSION
            Category = ""
            Description = "Directive Utilities automation test host."
            Plugins = @(
              @{
                Name = "DirectiveUtilities"
                Enabled = $true
              }
            )
          } | ConvertTo-Json -Depth 4 | Set-Content -Path $projectPath -Encoding utf8

          $editor = Join-Path $env:ENGINE_PATH "Engine/Binaries/Win64/UnrealEditor-Cmd.exe"
          & $editor $projectPath -unattended -nop4 -nosplash -nullrhi -NoLiveCoding '-ExecCmds=Automation RunTests DirectiveUtilities; Quit' '-TestExit=Automation Test Queue Empty' "-ReportExportPath=$reportDirectory"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DirectiveUtilities-Tests-UE${{ matrix.unreal-version }}
          path: TestReport-UE${{ matrix.unreal-version }}/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Build Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: DirectiveUtilities-UE${{ matrix.unreal-version }}-Win64-Linux
          path: Build/UE${{ matrix.unreal-version }}/
          retention-days: 30
